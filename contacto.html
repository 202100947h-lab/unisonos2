    <section class="contact-split">
      <div class="contact-left">
        <h1 class="contact-title">Contáctanos</h1>

        <!-- Toggle oculto para abrir/cerrar el panel -->
        <input type="checkbox" id="toggle-checklist" class="checklist-toggle">

        <form action="mailto:tucorreo@unisonos.com" method="POST" enctype="text/plain" class="contact-form">
          <input type="text" name="Nombre" class="form-input" placeholder="Nombre completo" required>
          <input type="email" name="Correo" class="form-input" placeholder="Correo electrónico" required>
          <input type="text" name="Compania" class="form-input" placeholder="Nombre de la compañía" required>

          <!-- Botón visual para abrir -->
          <label for="toggle-checklist" class="event-trigger">
            <span>Haz tu evento (Seleccionar)</span>
            <span class="event-plus">+</span>
          </label>

          <label class="terms-box">
            <input type="checkbox" required>
            <span>Acepto los términos y condiciones de privacidad.</span>
          </label>

          <button type="submit" class="btn-gold">Enviar Información</button>

          <!-- Panel checklist -->
          <div class="checklist-panel">
            <div class="checklist-head">
              <h2>Alcance del Proyecto</h2>
              <label for="toggle-checklist" class="checklist-close">×</label>
            </div>

            <p class="checklist-copy">
              Selecciona una o varias categorías para ayudarnos a entender mejor tu evento.
            </p>

            <div class="checklist-grid">
              <label><input type="checkbox" name="evento[]" value="Corporativo"> Corporativo</label>
              <label><input type="checkbox" name="evento[]" value="Gala"> Cena de Gala</label>
              <label><input type="checkbox" name="evento[]" value="Lanzamiento"> Lanzamiento</label>
              <label><input type="checkbox" name="evento[]" value="Cultural"> Evento Cultural</label>
              <label><input type="checkbox" name="evento[]" value="BTL"> Activación BTL</label>
              <label><input type="checkbox" name="evento[]" value="Danza"> Espectáculo Danza</label>
              <label><input type="checkbox" name="evento[]" value="Privado"> Privado Exclusivo</label>
              <label><input type="checkbox" name="evento[]" value="Integracion"> Integración</label>
              <label><input type="checkbox" name="evento[]" value="Congreso"> Congreso</label>
              <label><input type="checkbox" name="evento[]" value="Premiacion"> Premiación</label>
            </div>

            <!-- Botón visual para cerrar -->
            <label for="toggle-checklist" class="btn-gold checklist-confirm">
              Confirmar
            </label>
          </div>
        </form>
      </div>

      <div class="contact-right">
        <img src="assets/home/portadaUNISONOS.gif" alt="Danza Cusqueña Diablada">
      </div>
    </section>
